<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Project-to-Production AI</title>

<style>
/* PwC-inspired palette: charcoal + orange accent */
:root {
  --pwc-orange: #d04a02;
  --pwc-orange-dark: #a83802;
  --pwc-orange-mid: #e87722;
  --pwc-orange-light: #f4a574;
  --pwc-orange-glow: rgba(208, 74, 2, 0.45);
  --pwc-charcoal: #1d1d1b;
  --pwc-charcoal-mid: #2d2a26;
  --pwc-charcoal-soft: #46403c;
  --pwc-paper: #faf8f6;
  --pwc-paper-warm: #f3efe9;
  --pwc-card: #ffffff;
  --pwc-border: rgba(45, 42, 38, 0.12);
  --pwc-text: #2d2a26;
  --pwc-text-muted: #6b6560;
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
}

@keyframes gradient-shift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

@keyframes fade-in-up {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes float-soft {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  display: flex;
  height: 100vh;
  color: var(--pwc-text);
  background: var(--pwc-paper);
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  background:
    radial-gradient(ellipse 120% 80% at 100% 0%, rgba(208, 74, 2, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse 80% 60% at 0% 100%, rgba(232, 119, 34, 0.06) 0%, transparent 45%),
    linear-gradient(165deg, var(--pwc-paper) 0%, var(--pwc-paper-warm) 55%, #ebe6e0 100%);
  background-size: 100% 100%, 100% 100%, 200% 200%;
  animation: gradient-shift 18s ease-in-out infinite;
}

/* LEFT SIDEBAR */
.sidebar {
  width: 280px;
  background: linear-gradient(180deg, var(--pwc-charcoal) 0%, var(--pwc-charcoal-mid) 100%);
  color: #fff;
  position: fixed;
  top: 60px;
  left: 0;
  bottom: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(255, 255, 255, 0.06);
  box-shadow: 4px 0 24px rgba(0, 0, 0, 0.12);
}

.sidebar::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: linear-gradient(180deg, var(--pwc-orange-mid) 0%, var(--pwc-orange) 50%, var(--pwc-orange-dark) 100%);
}

.sidebar h2 {
  margin: 0;
  padding: 15px 15px 10px;
  font-size: 19px;
  text-align: center;
  white-space: nowrap;
  margin-bottom: 5px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.15);
}

.sidebar-content {
  padding: 14px 16px 20px;
}

/* Primary actions — PwC orange */
.sidebar button,
.main button,
#output button {
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.02em;
  width: 100%;
  margin: 10px 0;
  padding: 12px 16px;
  border: none;
  border-radius: 8px;
  color: #fff;
  cursor: pointer;
  background: linear-gradient(180deg, var(--pwc-orange-mid) 0%, var(--pwc-orange) 100%);
  box-shadow:
    0 2px 0 rgba(0, 0, 0, 0.12),
    0 8px 20px var(--pwc-orange-glow);
  transition:
    transform 0.22s var(--ease-out),
    box-shadow 0.22s var(--ease-out),
    filter 0.22s var(--ease-out);
}

.sidebar button:hover,
.main button:hover,
#output button:hover {
  transform: translateY(-2px);
  box-shadow:
    0 4px 0 rgba(0, 0, 0, 0.1),
    0 14px 28px rgba(208, 74, 2, 0.4);
  filter: brightness(1.05);
}

.sidebar button:active,
.main button:active,
#output button:active {
  transform: translateY(0);
  box-shadow: 0 2px 8px var(--pwc-orange-glow);
}

/* Toolbar row: non-full-width buttons inside output */
#output .meta-toolbar button {
  width: auto;
  margin: 0;
}

.meta-toolbar {
  margin-bottom: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.meta-toolbar button {
  width: auto;
  margin: 0;
}

/* Metadata actions: stay inside #output card; stick to bottom while scrolling */
.meta-sticky-actions {
  position: sticky;
  bottom: 0;
  z-index: 5;
  width: 100%;
  max-width: 100%;
  box-sizing: border-box;
  margin-top: 16px;
  margin-left: 0;
  margin-right: 0;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.97) 0%, var(--pwc-card) 100%);
  backdrop-filter: blur(10px);
  padding: 8px 4px 10px;
  border-top: 1px solid var(--pwc-border);
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: stretch;
  gap: 8px;
  box-shadow: 0 -6px 24px rgba(45, 42, 38, 0.06);
}

.meta-sticky-actions button {
  flex: 1 1 calc(50% - 6px);
  min-width: 0;
  max-width: 100%;
  margin: 0;
  padding: 6px 8px;
  font-size: 11px;
  font-weight: 600;
  line-height: 1.25;
  border-radius: 6px;
  white-space: normal;
  text-align: center;
  overflow-wrap: anywhere;
  word-break: break-word;
  box-shadow:
    0 1px 0 rgba(0, 0, 0, 0.1),
    0 3px 12px var(--pwc-orange-glow);
}

.meta-sticky-actions button:hover {
  transform: translateY(-1px);
}

@media (max-width: 520px) {
  .meta-sticky-actions button {
    flex: 1 1 100%;
  }
}

/* MAIN CONTENT */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  margin-left: 280px;
  margin-top: 60px;
  padding: 24px 20px 32px;
  min-height: calc(100vh - 60px);
}

#output {
  margin: 24px auto;
  padding: 28px 28px 32px;
  background: var(--pwc-card);
  border-radius: 12px;
  min-height: 300px;
  width: 90%;
  max-width: 1100px;
  min-width: 0;
  text-align: left;
  border: 1px solid var(--pwc-border);
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.8) inset,
    0 12px 40px rgba(45, 42, 38, 0.08);
  animation: fade-in-up 0.55s var(--ease-out) both;
}

#output h2,
#output h3 {
  margin-top: 10px;
  color: var(--pwc-charcoal-mid);
}

table {
  margin-bottom: 20px;
  border-collapse: collapse;
  width: 100%;
}

#metaTable {
  border: 1px solid var(--pwc-border);
  border-radius: 8px;
  overflow: hidden;
}

#metaTable th {
  background: linear-gradient(180deg, var(--pwc-paper-warm) 0%, #ebe6e0 100%);
  color: var(--pwc-text);
  padding: 10px 8px;
  text-align: left;
}

#metaTable td {
  border-top: 1px solid var(--pwc-border);
  padding: 8px;
    color: var(--pwc-text);
  font-weight: 400;
}

/* Chatbot Icon */
#chatbotIcon {
  position: fixed;
  bottom: 22px;
  left: 22px;
  background: linear-gradient(145deg, var(--pwc-orange-mid), var(--pwc-orange));
  color: #fff;
  padding: 14px 16px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 20px;
  box-shadow: 0 8px 24px var(--pwc-orange-glow);
  transition: transform 0.25s var(--ease-out), box-shadow 0.25s var(--ease-out);
  z-index: 1001;
  animation: float-soft 4s ease-in-out infinite;
}

#chatbotIcon:hover {
  transform: scale(1.06);
  box-shadow: 0 12px 32px rgba(208, 74, 2, 0.5);
}

/* Chat Window */
#chatWindow {
  position: fixed;
  bottom: 88px;
  left: 20px;
  width: 320px;
  height: 420px;
  background: var(--pwc-card);
  border-radius: 12px;
  display: none;
  flex-direction: column;
  box-shadow: 0 16px 48px rgba(45, 42, 38, 0.18);
  border: 1px solid var(--pwc-border);
  overflow: hidden;
  z-index: 1001;
  animation: fade-in-up 0.35s var(--ease-out);
}

#chatHeader {
  background: linear-gradient(90deg, var(--pwc-charcoal-mid) 0%, var(--pwc-charcoal-soft) 100%);
  color: #fff;
  padding: 12px 14px;
  font-weight: 600;
  border-bottom: 3px solid var(--pwc-orange);
}

#chatMessages {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
  background: var(--pwc-paper);
}

#chatInput {
  border: none;
  border-top: 1px solid var(--pwc-border);
  padding: 12px 14px;
  width: 100%;
  font-family: inherit;
  font-size: 14px;
}

#chatInput:focus {
  outline: none;
  box-shadow: inset 0 0 0 2px rgba(208, 74, 2, 0.25);
}

.bot {
  background: #fff;
  padding: 10px 12px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid var(--pwc-border);
  box-shadow: 0 2px 8px rgba(45, 42, 38, 0.04);
}

.user {
  background: linear-gradient(180deg, var(--pwc-orange-mid), var(--pwc-orange));
  color: #fff;
  padding: 10px 12px;
  margin: 6px 0;
  border-radius: 8px;
  text-align: right;
  box-shadow: 0 4px 12px var(--pwc-orange-glow);
}

.sidebar p {
  text-align: center;
  color: rgba(255, 255, 255, 0.72);
}

th input,
th select {
  margin-top: 5px;
  padding: 6px 8px;
  font-size: 12px;
  border-radius: 6px;
  border: 1px solid var(--pwc-border);
  font-family: inherit;
}

th {
  user-select: none;
}

th:hover {
  background: rgba(208, 74, 2, 0.06);
}

#orgHeader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60px;
  background: linear-gradient(90deg, var(--pwc-charcoal) 0%, var(--pwc-charcoal-mid) 55%, var(--pwc-charcoal-soft) 100%);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  z-index: 1000;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
}

#orgHeader::after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--pwc-orange) 0%, var(--pwc-orange-mid) 40%, var(--pwc-orange-light) 100%);
}

.header-left {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-brand-mark {
  width: 10px;
  height: 28px;
  border-radius: 2px;
  background: linear-gradient(180deg, var(--pwc-orange-mid) 0%, var(--pwc-orange) 100%);
  box-shadow: 0 0 20px var(--pwc-orange-glow);
}

.header-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: 15px;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.92);
}

.status-dot {
  height: 10px;
  width: 10px;
  margin-right: 10px;
  border-radius: 50%;
  display: inline-block;
  vertical-align: middle;
}

/* Connected org — blinking green */
.status-dot.connected {
  background-color: #22c55e;
  animation: blink-green 1.1s ease-in-out infinite;
  box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.45);
}

@keyframes blink-green {
  0%,
  100% {
    opacity: 1;
    box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5);
  }
  50% {
    opacity: 0.35;
    box-shadow: 0 0 0 7px rgba(34, 197, 94, 0);
  }
}

.status-dot.error {
  background-color: #c41e3a;
  animation: pulse-error 1.5s infinite;
}

@keyframes pulse-error {
  0% {
    box-shadow: 0 0 0 0 rgba(196, 30, 58, 0.5);
  }
  70% {
    box-shadow: 0 0 0 8px rgba(196, 30, 58, 0);
  }
  100% {
    box-shadow: 0 0 0 0 rgba(196, 30, 58, 0);
  }
}

@keyframes blink {
  0% {
    opacity: 1;
  }
  50% {
    opacity: 0.3;
  }
  100% {
    opacity: 1;
  }
}

.table-row {
    opacity: 0;
  transform: translateY(10px);
  animation: fadeInUp 0.3s ease forwards;
  transition: all 0.2s ease;
}
@keyframes fadeInUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.generate-btn.active {
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255,122,0,0.4); }
  70% { box-shadow: 0 0 0 10px rgba(255,122,0,0); }
  100% { box-shadow: 0 0 0 0 rgba(255,122,0,0); }
}


.table-row:hover {
  background-color: rgba(255, 140, 0, 0.08); /* soft orange tint */
  transform: scale(1.002);
  cursor: pointer;
}

.table-row.selected {
  background-color: rgba(255, 140, 0, 0.15);
  border-left: 4px solid #ff7a00;
  box-shadow: 0 2px 8px rgba(255, 122, 0, 0.2);
}

.table-row.selected td {
  font-weight: 500;
}

input[type="checkbox"] {
  transition: transform 0.15s ease;
}

input[type="checkbox"]:checked {
  transform: scale(1.2);
}

.button {
  transition: all 0.2s ease;
}

.button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(255, 122, 0, 0.3);
}

.button:active {
  transform: scale(0.97);
}

#metaTable th:nth-child(1),
#metaTable td:nth-child(1) {
  width: 60px; /* checkbox column */
  text-align: center;
}

#metaTable th:nth-child(2),
#metaTable td:nth-child(2) {
  width: 35%; /* Name */
}


/* Keep others slightly muted */
#metaTable td:nth-child(3),
#metaTable td:nth-child(4),
#metaTable td:nth-child(5) {
  color: var(--pwc-text-muted);
}

#metaTable th:nth-child(3),
#metaTable td:nth-child(3) {
  width: 15%; /* Type */
}

#metaTable th:nth-child(4),
#metaTable td:nth-child(4) {
  width: 20%; /* Date */
}

#metaTable th:nth-child(5),
#metaTable td:nth-child(5) {
  width: 20%; /* Modified By */
  white-space: nowrap; /* prevent ugly wrapping */
    font-weight: 400; /* remove bold from Modified By */
  color: var(--pwc-text);
    max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Optional: slightly mute less important columns */
#metaTable td:nth-child(3),
#metaTable td:nth-child(4) {
  color: var(--pwc-text-muted);
}



textarea {
  width: 100%;
  height: 120px;
  margin-bottom: 10px;
  padding: 12px 14px;
  border-radius: 8px;
  border: 1px solid var(--pwc-border);
  font-family: inherit;
  font-size: 13px;
  line-height: 1.45;
  background: #fff;
  color: var(--pwc-text);
  transition: border-color 0.2s, box-shadow 0.2s;
  resize: vertical;
}

textarea:focus {
  outline: none;
  border-color: rgba(208, 74, 2, 0.55);
  box-shadow: 0 0 0 3px rgba(208, 74, 2, 0.15);
}

.sidebar hr {
  border: none;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
  margin: 14px 0;
}
</style>
</head>

<body>

<!-- LEFT MENU -->
<div class="sidebar">

  <div class="sidebar-content">
    <button onclick="generateMetadata()">🧬 Generate Metadata</button>
    <button onclick="validateChanges()">🧪 Validate Changes</button>
    <button onclick="deployChanges()">🚀 Deploy</button>
    <button onclick="showMetadata()">📊 Metadata Details</button>

    <hr>

    <textarea id="riskInput" placeholder="Enter metadata:
AccountController.cls
FlowName.flow-meta.xml"></textarea>

    <button onclick="analyzeRisk()">⚠️ Risk Analysis</button>
  </div>
</div>

<!-- MAIN OUTPUT -->
<div class="main">
    <div id="orgHeader">
  <div class="header-left">
    <span class="header-brand-mark" aria-hidden="true"></span>
    <span>Project-to-Production AI</span>
  </div>

  <div class="header-center" id="orgStatus">
    ⏳ Connecting...
  </div>
</div>
  <div id="output">Welcome 👋<br>Select an action from the left.</div>
</div>

<script>
function run(endpoint) {
  document.getElementById("output").innerHTML = "⏳ Running...";

  fetch("/" + endpoint)
    .then(res => res.text())
    .then(data => {
      document.getElementById("output").innerHTML = data;
    });
}

function downloadFile() {
  window.open('/download-package');
}

function generateMetadata() {
  document.getElementById("output").innerHTML = "⏳ Generating metadata...";

  fetch('/generate-metadata')
    .then(res => res.text())
    .then(data => {
      document.getElementById("output").innerHTML = data;
    })
    .catch(() => {
      document.getElementById("output").innerHTML = "❌ Failed to generate metadata";
    });
}

function validateChanges() {
  document.getElementById("output").innerHTML = "⏳ Validating changes...";

  fetch('/validate')
    .then(res => res.text())
    .then(data => {
      document.getElementById("output").innerHTML = data;
    })
    .catch(() => {
      document.getElementById("output").innerHTML = "❌ Validation failed";
    });
}

function deployChanges() {
  document.getElementById("output").innerHTML = "⏳ Deploying...";

  fetch('/deploy')
    .then(res => res.text())
    .then(data => {
      document.getElementById("output").innerHTML = data;
    })
    .catch(() => {
      document.getElementById("output").innerHTML = "❌ Deployment failed";
    });
}

function showMetadata() {
  document.getElementById("output").innerHTML =
    "<h3>⏳ Fetching metadata... please wait (~30–60 sec)</h3>";

  fetch('/metadata-grid')
    .then(res => res.json())
    .then(data => {

      if (data.error) {
        document.getElementById("output").innerHTML =
          "❌ Error: " + data.error;
        return;
      }

      const now = new Date();

    let html = `
    <h2>📊 Metadata Details</h2>

        <div class="meta-toolbar">
        <button type="button" onclick="clearFilters()">Clear filters</button>
        </div>

    <table border="1" cellpadding="5" id="metaTable">
        <tr>
        <th>Select</th>
        <th>
            Name<br>
            <input type="text" id="nameFilter" placeholder="Search..."
            onkeyup="applyFilters()" style="width:90%">
        </th>
        <th>
            Type<br>
            <select id="typeFilter" onchange="applyFilters()" style="width:100%">
            <option value="">All</option>
            <option value="ApexClass">ApexClass</option>
            <option value="Profile">Profile</option>
            <option value="Flow">Flow</option>
            <option value="CustomObject">CustomObject</option>
            <option value="Layout">Layout</option>
            <option value="PermissionSet">PermissionSet</option>
            <option value="ApexTrigger">ApexTrigger</option>
            <option value="LightningComponentBundle">LightningComponentBundle</option>
            </select>
        </th>
        <th>
            Date<br>
            <input type="date" id="dateFilter" onchange="applyFilters()" style="width:95%">
        </th>
        <th>Modified By</th>
        </tr>
       `;

      data.forEach(item => {
        html += `
          <tr>
            <td><input type="checkbox" value='${JSON.stringify(item)}'></td>
            <td>${item.name}</td>
            <td>${item.type}</td>
            <td>${item.lastModified ? new Date(item.lastModified).toLocaleString() : '-'}</td>
            <td>${item.modifiedBy}</td>
          </tr>
        `;
      });

      html += `
        </table>

        <div class="meta-sticky-actions">

        <button type="button" onclick="generateSelected()">📦 Selected package</button>

        <button type="button" onclick="generateLast5Days()">⚡ Last 5 days</button>

        </div>
        `;

      document.getElementById("output").innerHTML = html;
    })
    .catch(err => {
      document.getElementById("output").innerHTML =
        "❌ Failed to load metadata";
      console.error(err);
    });
}

function generateSelected() {
  const selected = [];

  document.querySelectorAll("input[type=checkbox]:checked").forEach(cb => {
    selected.push(JSON.parse(cb.value));
  });

  // ✅ Validation
  if (!selected.length) {
    alert("⚠️ Please select at least one item");
    return;
  }


  // API call
  fetch('/generate-selected', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(selected)
  })
    .then(res => res.blob())
    .then(blob => {
      const url = window.URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = "package.xml";
      a.click();

      window.URL.revokeObjectURL(url);
    })
    .catch(() => {
      document.getElementById("output").innerHTML =
        "❌ Failed to generate package";
    });
}

function generateLast5Days() {
  document.getElementById("output").innerHTML = "⏳ Generating last 5 days package...";

  fetch('/generate-last-5-days')
    .then(res => res.blob())
    .then(blob => {
      const url = window.URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = "last-5-days-package.xml"; // file name
      a.click();

      window.URL.revokeObjectURL(url);

    })
    .catch(() => {
      document.getElementById("output").innerHTML =
        "❌ Failed to generate package";
    });
}

function analyzeRisk() {
  const input = document.getElementById("riskInput").value;

  const list = input.split("\n").map(i => i.trim()).filter(i => i);

  if (!list.length) {
    document.getElementById("output").innerHTML = "❌ Enter metadata";
    return;
  }

  document.getElementById("output").innerHTML = "⏳ Analyzing risk...";

  fetch('/analyze-risk', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(list)
  })
    .then(res => res.text())
    .then(data => {
      document.getElementById("output").innerHTML = data;
    });
}



function toggleChat() {
  const chat = document.getElementById("chatWindow");
  chat.style.display = chat.style.display === "flex" ? "none" : "flex";
}

function handleChat(event) {
  if (event.key === "Enter") {
    const input = document.getElementById("chatInput");
    const msg = input.value;

    if (!msg) return;

    addMessage("user", msg);
    input.value = "";

    processMessage(msg);
  }
}

function addMessage(type, text) {
  const div = document.createElement("div");
  div.className = type;
  div.innerText = text;
  document.getElementById("chatMessages").appendChild(div);
}

function processMessage(msg) {

  fetch('/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg })
  })
  .then(res => res.json())
  .then(data => {
    addMessage("bot", data.reply);
  });
}
//Filter condition for Meta data grid 
function applyFilters() {
  const name = document.getElementById("nameFilter").value.toLowerCase();
  const type = document.getElementById("typeFilter").value;
  const date = document.getElementById("dateFilter").value;

  const rows = document.querySelectorAll("#metaTable tr");

  rows.forEach((row, index) => {
    if (index === 0) return; // skip header

    const cols = row.children;
    if (!cols || cols.length < 5) return;

    const rowName = cols[1].innerText.toLowerCase();
    const rowType = cols[2].innerText;
    const rowDate = cols[3].innerText;

    let show = true;

    if (name && !rowName.includes(name)) show = false;
    if (type && rowType !== type) show = false;

    if (date) {
      const formatted = new Date(rowDate).toISOString().slice(0,10);
      if (formatted !== date) show = false;
    }

    row.style.display = show ? "" : "none";
  });
}

//clearFilters condition for Meta data grid 
function clearFilters() {
  document.getElementById("nameFilter").value = "";
  document.getElementById("typeFilter").value = "";
  document.getElementById("dateFilter").value = "";

  applyFilters(); // reapply (shows all)
}
//loadOrgInfo for tope header
function loadOrgInfo() {
  fetch('/org-info')
    .then(res => res.json())
    .then(data => {
      document.getElementById("orgStatus").innerHTML =
        `<span class="status-dot connected" title="Connected"></span> Connected to: ${data.orgName}`;
    })
    .catch(() => {
      document.getElementById("orgStatus").innerHTML =
        `<span class="status-dot error"></span> Not connected`;
    });
}

window.onload = function () {
  loadOrgInfo();
};
